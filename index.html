<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CO-SHOW 플레이 스타일 테스트</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1d2bff 0%, #12153d 35%, #070813 100%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 28px 18px 60px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(12px);
      font-size: 14px;
      color: #d9e2ff;
    }
    .hero, .card {
      border: 1px solid rgba(255,255,255,.18);
      background: linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      border-radius: 28px;
      padding: 32px;
      backdrop-filter: blur(18px);
    }
    .hero { margin-top: 24px; text-align: center; position: relative; overflow: hidden; }
    .hero::before {
      content: "";
      position: absolute;
      inset: -80px;
      background: conic-gradient(from 180deg, transparent, rgba(0,240,255,.24), transparent, rgba(255,0,200,.18), transparent);
      animation: spin 10s linear infinite;
      z-index: -2;
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 26px;
      background: rgba(8,10,28,.82);
      z-index: -1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      margin: 20px 0 12px;
      font-size: clamp(34px, 8vw, 70px);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }
    .gradient-text {
      background: linear-gradient(90deg, #4df3ff, #8b7bff, #ff54d8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .desc {
      color: #cbd5ff;
      font-size: 18px;
      line-height: 1.7;
      margin: 0 auto 28px;
      max-width: 640px;
    }
    button {
      border: 0;
      cursor: pointer;
      color: #fff;
      font-weight: 800;
      border-radius: 18px;
      transition: transform .18s, box-shadow .18s, opacity .18s;
      font-family: inherit;
    }
    button:hover { transform: translateY(-2px); }
    .primary {
      padding: 16px 28px;
      font-size: 18px;
      background: linear-gradient(90deg, #00d9ff, #7c5cff, #ff3ccc);
      box-shadow: 0 16px 40px rgba(73, 94, 255, .38);
    }
    .secondary {
      padding: 13px 18px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
    }
    .hidden { display: none !important; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
    }
    .progress {
      flex: 1;
      height: 12px;
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00eaff, #ff4fe7);
      border-radius: inherit;
      transition: width .25s;
    }
    .question-title {
      font-size: clamp(24px, 5vw, 42px);
      line-height: 1.25;
      letter-spacing: -0.04em;
      margin: 4px 0 24px;
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .option {
      text-align: left;
      padding: 20px;
      min-height: 96px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      color: #fff;
    }
    .option:hover { box-shadow: 0 12px 30px rgba(0,0,0,.25); }
    .option b { display: block; font-size: 18px; margin-bottom: 8px; }
    .option span { color: #bfc8ef; font-weight: 500; }
    .result-header {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      text-align: center;
    }
    .type-emoji { font-size: 72px; margin-bottom: 4px; }
    .type-name { font-size: clamp(34px, 7vw, 58px); margin: 0; letter-spacing: -0.05em; }
    .section-title { margin: 34px 0 14px; font-size: 24px; }
    .booths, .route, .compat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .mini-card {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.16);
    }
    .mini-card strong { display: block; font-size: 18px; margin-bottom: 6px; }
    .mini-card p { margin: 0; color: #cbd5ff; line-height: 1.55; }
    .route .mini-card { text-align: center; }
    .step { color: #61f2ff; font-weight: 900; font-size: 13px; letter-spacing: .08em; }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    select, input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    select option { color: #111; }
    .share-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(0,0,0,.25);
      color: #dce4ff;
      line-height: 1.6;
      word-break: keep-all;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 12px 16px;
      background: rgba(0,0,0,.78);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 20;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 720px) {
      .hero, .card { padding: 24px 18px; border-radius: 24px; }
      .options, .booths, .route, .compat-grid { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .progress { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="intro" class="hero">
      <div class="badge">🎮 첨단교육, SHOW로 펼쳐지다!</div>
      <h1>입장 전,<br><span class="gradient-text">나의 플레이 스타일</span>을 분석하라</h1>
      <p class="desc">질문에 답하면 나에게 맞는 CO-SHOW 유형, 추천 부스, 추천 동선, 친구와의 궁합까지 알려드려요.</p>
      <button class="primary" onclick="startTest()">START MISSION</button>
    </section>

    <section id="quiz" class="hidden">
      <div class="topbar">
        <div class="badge" id="countBadge">MISSION 1 / 8</div>
        <div class="progress"><div id="progressBar"></div></div>
      </div>
      <div class="card">
        <h2 id="questionTitle" class="question-title"></h2>
        <div id="options" class="options"></div>
      </div>
    </section>

    <section id="result" class="hidden card"></section>
  </main>

  <div id="toast" class="toast">복사 완료!</div>

  <script>
    const types = {
      tech: {
        emoji: "🤖", name: "테크 탐험가형", tag: "움직이는 기술을 정복하는 체험러",
        desc: "새로운 기술을 직접 만지고 조작해보는 걸 좋아해요. 설명만 듣는 것보다 눈앞에서 움직이는 기술을 볼 때 가장 몰입하는 타입!",
        booths: [
          ["B05", "지능형로봇", "로봇 기술과 자동화 체험 추천"],
          ["B04", "인공지능", "AI가 어떻게 판단하고 작동하는지 탐색"],
          ["B11", "항공드론", "하늘을 움직이는 기술 체험"]
        ],
        mission: "움직이는 미래 기술 3종을 클리어하라!"
      },
      future: {
        emoji: "🚀", name: "미래 개척자형", tag: "미래 산업을 먼저 체험하는 선구자",
        desc: "자동차, 드론, 통신처럼 앞으로 세상을 바꿀 기술에 관심이 많아요. 미래 도시를 탐험하는 느낌의 부스가 잘 맞아요.",
        booths: [
          ["B08", "미래자동차", "모빌리티와 스마트 이동수단 체험"],
          ["B03", "차세대통신", "미래 연결 기술 탐색"],
          ["B11", "항공드론", "드론·항공 기술 체험"]
        ],
        mission: "미래 이동수단 루트를 완주하라!"
      },
      creator: {
        emoji: "🎨", name: "디지털 크리에이터형", tag: "콘텐츠와 비주얼에 강한 감성 플레이어",
        desc: "사진, 영상, 그래픽, 몰입형 콘텐츠에 끌리는 타입이에요. 보고 찍고 공유하기 좋은 부스에서 만족도가 높아요.",
        booths: [
          ["A07", "실감미디어", "몰입형 콘텐츠와 미디어 체험"],
          ["A04", "차세대디스플레이", "새로운 화면과 표현 기술 탐색"],
          ["B04", "인공지능", "AI 콘텐츠 제작 아이디어 연결"]
        ],
        mission: "가장 공유하고 싶은 장면을 찾아라!"
      },
      eco: {
        emoji: "🌱", name: "친환경 연구원형", tag: "바이오와 에너지에 관심 많은 연구러",
        desc: "환경, 생명, 에너지처럼 지속가능한 미래를 만드는 기술에 관심이 많아요. 탐구형 부스가 잘 맞아요.",
        booths: [
          ["A01", "그린바이오", "생명·환경 기술 탐색"],
          ["A05", "바이오헬스", "건강과 바이오 기술 체험"],
          ["B06", "에너지신산업", "친환경 에너지 기술 탐색"]
        ],
        mission: "지속가능한 미래 기술을 발견하라!"
      },
      data: {
        emoji: "🧩", name: "데이터 전략가형", tag: "논리와 분석으로 루트를 설계하는 타입",
        desc: "숫자, 정보, 패턴을 보고 문제를 해결하는 걸 좋아해요. 데이터와 AI, 보안이 연결되는 부스를 추천해요.",
        booths: [
          ["A03", "빅데이터", "데이터 분석과 활용 탐색"],
          ["B04", "인공지능", "AI 판단 구조 이해"],
          ["B07", "데이터보안활용융합", "데이터와 보안의 연결 체험"]
        ],
        mission: "데이터 속 숨은 패턴을 찾아라!"
      },
      chip: {
        emoji: "⚡", name: "반도체 엔지니어형", tag: "하드웨어와 소재 구조에 강한 엔지니어",
        desc: "기술이 실제로 어떻게 만들어지는지, 기계와 부품 안쪽 구조가 궁금한 타입이에요. 반도체·소재 계열 부스가 잘 맞아요.",
        booths: [
          ["A02", "차세대반도체", "반도체 기술의 핵심 이해"],
          ["B02", "반도체소부장", "소재·부품·장비 흐름 탐색"],
          ["B10", "첨단소재나노융합", "나노 소재와 미래 산업 연결"]
        ],
        mission: "미래 기술의 핵심 부품을 추적하라!"
      }
    };

    const questions = [
      { q: "학교 축제에서 가장 먼저 가는 곳은?", a: [["체험존", "직접 해봐야 재밌지", "tech"], ["포토존", "남는 건 사진", "creator"], ["이벤트존", "미션과 경품은 못 참지", "future"], ["전시존", "정보부터 차근차근", "data"]] },
      { q: "미래 기술 중 가장 궁금한 건?", a: [["AI", "사람처럼 판단하는 기술", "data"], ["로봇", "움직이는 기계", "tech"], ["드론/미래차", "하늘과 도로의 미래", "future"], ["바이오/에너지", "지속가능한 미래", "eco"]] },
      { q: "친구들이 보는 내 이미지는?", a: [["분석가", "이유와 근거를 따지는 편", "data"], ["인싸", "분위기를 살리는 편", "creator"], ["덕후", "관심 분야 파고드는 편", "chip"], ["행동파", "일단 해보는 편", "tech"]] },
      { q: "게임 플레이 스타일은?", a: [["미션 올클리어", "퀘스트는 끝까지", "tech"], ["자유 탐험", "새로운 맵 구경", "future"], ["아이템 수집", "굿즈와 기록 중요", "creator"], ["전략 설계", "효율적인 루트 선호", "data"]] },
      { q: "가장 재밌는 순간은?", a: [["새로운 원리를 알 때", "아하! 하는 순간", "data"], ["직접 조작할 때", "만지고 움직이면 몰입", "tech"], ["결과물을 만들 때", "내 작품이 생기는 느낌", "creator"], ["문제를 해결할 때", "구조를 파악하는 재미", "chip"]] },
      { q: "더 끌리는 키워드는?", a: [["데이터", "분석과 예측", "data"], ["기계", "로봇과 장비", "tech"], ["영상/그래픽", "몰입형 콘텐츠", "creator"], ["친환경", "바이오와 에너지", "eco"]] },
      { q: "행사에서 꼭 챙기는 건?", a: [["굿즈", "기념품은 필수", "creator"], ["체험", "직접 해봐야 함", "tech"], ["정보", "진로 탐색이 중요", "data"], ["신기술", "미래 산업 구경", "future"]] },
      { q: "미래 직업을 고른다면?", a: [["AI/데이터 전문가", "데이터로 문제 해결", "data"], ["로봇 엔지니어", "움직이는 기술 개발", "tech"], ["콘텐츠 디자이너", "디지털 경험 제작", "creator"], ["반도체/소재 연구원", "기술의 핵심을 만드는 일", "chip"]] }
    ];

    const compatibility = {
      "tech_creator": ["🎨 감성 체험 듀오", "한 명은 체험하고 한 명은 기록하는 조합! 실감미디어, AI, 로봇 루트 추천."],
      "tech_data": ["🧠 분석형 체험 듀오", "직접 체험하고 원리까지 파악하는 조합! 로봇, AI, 빅데이터 루트 추천."],
      "tech_future": ["🔥 레전드 탐험 듀오", "움직이는 기술과 미래 산업을 한 번에 즐기는 조합! 로봇, 미래차, 드론 추천."],
      "creator_future": ["📸 바이럴 듀오", "사진 찍기 좋은 미래 기술 코스를 잘 즐기는 조합! 실감미디어, 미래차, 드론 추천."],
      "data_chip": ["⚡ 찐공학 듀오", "분석력과 하드웨어 감각이 만난 조합! 빅데이터, 반도체, 나노융합 추천."],
      "eco_data": ["🌱 연구 전략 듀오", "지속가능한 기술을 데이터 관점으로 보는 조합! 바이오, 에너지, 빅데이터 추천."],
      default: ["🤝 밸런스 탐험 듀오", "서로 다른 관심사를 섞어 더 넓게 즐길 수 있는 조합! 각자 추천 부스 1개씩 골라 같이 돌아보세요."]
    };

    let current = 0;
    let scores = { tech: 0, future: 0, creator: 0, eco: 0, data: 0, chip: 0 };
    let finalType = null;

    function startTest() {
      document.getElementById("intro").classList.add("hidden");
      document.getElementById("quiz").classList.remove("hidden");
      current = 0;
      scores = { tech: 0, future: 0, creator: 0, eco: 0, data: 0, chip: 0 };
      renderQuestion();
    }

    function renderQuestion() {
      const item = questions[current];
      document.getElementById("countBadge").textContent = `MISSION ${current + 1} / ${questions.length}`;
      document.getElementById("progressBar").style.width = `${(current / questions.length) * 100}%`;
      document.getElementById("questionTitle").textContent = item.q;
      document.getElementById("options").innerHTML = item.a.map(([title, sub, type]) => `
        <button class="option" onclick="choose('${type}')">
          <b>${title}</b>
          <span>${sub}</span>
        </button>
      `).join("");
    }

    function choose(type) {
      scores[type] += 1;
      current += 1;
      if (current >= questions.length) showResult();
      else renderQuestion();
    }

    function getTopType() {
      return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
    }

    function showResult() {
      finalType = getTopType();
      const data = types[finalType];
      document.getElementById("quiz").classList.add("hidden");
      const result = document.getElementById("result");
      result.classList.remove("hidden");
      result.innerHTML = `
        <div class="result-header">
          <div>
            <div class="type-emoji">${data.emoji}</div>
            <div class="badge">YOUR CO-SHOW TYPE</div>
            <h2 class="type-name gradient-text">${data.name}</h2>
            <p class="desc"><b>${data.tag}</b><br>${data.desc}</p>
          </div>
        </div>

        <h3 class="section-title">✨ 추천 부스</h3>
        <div class="booths">
          ${data.booths.map(b => `<div class="mini-card"><strong>${b[0]} ${b[1]}</strong><p>${b[2]}</p></div>`).join("")}
        </div>

        <h3 class="section-title">🗺️ 추천 동선</h3>
        <div class="route">
          ${data.booths.map((b, i) => `<div class="mini-card"><div class="step">STEP ${i + 1}</div><strong>${b[1]}</strong><p>${b[0]}</p></div>`).join("")}
        </div>

        <h3 class="section-title">🎯 오늘의 미션</h3>
        <div class="share-box">${data.mission}</div>

        <h3 class="section-title">🤝 친구랑 궁합 보기</h3>
        <div class="mini-card">
          <p style="margin-bottom:12px;">친구의 결과 유형을 선택하면 함께 돌기 좋은 조합을 알려줘요.</p>
          <select id="friendType" onchange="showCompatibility()">
            <option value="">친구 유형 선택하기</option>
            ${Object.entries(types).map(([key, value]) => `<option value="${key}">${value.emoji} ${value.name}</option>`).join("")}
          </select>
          <div id="compatResult" class="share-box hidden"></div>
        </div>

        <div class="actions">
          <button class="primary" onclick="copyResult()">결과 공유 문구 복사</button>
          <button class="secondary" onclick="restart()">다시 테스트하기</button>
        </div>
      `;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showCompatibility() {
      const friend = document.getElementById("friendType").value;
      if (!friend) return;
      const key1 = `${finalType}_${friend}`;
      const key2 = `${friend}_${finalType}`;
      const [title, text] = compatibility[key1] || compatibility[key2] || compatibility.default;
      const box = document.getElementById("compatResult");
      box.classList.remove("hidden");
      box.innerHTML = `<b>${title}</b><br>${types[finalType].name} + ${types[friend].name}<br>${text}`;
    }

    function copyResult() {
      const data = types[finalType];
      const text = `나는 CO-SHOW ${data.name}!\n추천 부스: ${data.booths.map(b => b[0] + " " + b[1]).join(" → ")}\n${data.mission}`;
      navigator.clipboard.writeText(text).then(() => showToast());
    }

    function showToast() {
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1600);
    }

    function restart() {
      document.getElementById("result").classList.add("hidden");
      document.getElementById("intro").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
</body>
</html>
